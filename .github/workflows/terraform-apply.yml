name: Terraform Apply

# Applies the deploy/ Terraform stack on every push to main that touches infra
# or knowledge-base content. State lives in the DO Spaces s3 backend, so CI works
# against the same state as local runs.

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - "knowledge-base/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# One apply at a time, queued (never cancelled) — the Spaces s3 backend has no
# native state locking, so overlapping applies could corrupt state.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: terraform apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    env:
      # DigitalOcean provider + app auth.
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_ID }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      # Agent API key the chat UI uses to call the agent (minted out-of-band).
      TF_VAR_agent_api_key: ${{ secrets.AGENT_API_KEY }}
      # s3 state backend auth (the same DigitalOcean Spaces key).
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.5"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
